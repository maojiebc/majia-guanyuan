    <text x="24" y="350" font-size="12" fill="#475569">• 多表 / 多页面 / 多字段缓存（按 --task 隔离）</text>
    <text x="24" y="370" font-size="12" fill="#475569">• 自动处理观远 7.0+ draft-release 机制</text>

