<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 760" font-family="-apple-system, 'PingFang SC', 'Segoe UI', 'Microsoft YaHei', sans-serif">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="8" flood-opacity="0.06"/>
    </filter>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2f7"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="760" fill="url(#bg)"/>

  <!-- Header -->
  <text x="640" y="46" text-anchor="middle" font-size="28" font-weight="700" fill="#0f172a">guanyuan-majia · 观远 BI 全链路 Agent Skill</text>
  <text x="640" y="74" text-anchor="middle" font-size="13" fill="#64748b">三块拼图，覆盖一份 BI 工作的"读数 / 治理 / 自定义"全部场景  ·  工具无关 (Claude Code · OpenClaw · Codex · Hermes)</text>

  <!-- A: Data Query -->
  <g transform="translate(55, 110)">
    <rect width="380" height="430" rx="14" fill="#ffffff" stroke="#e2e8f0" filter="url(#shadow)"/>
    <rect width="380" height="8" rx="3" fill="#3b82f6"/>
    <text x="24" y="46" font-size="11" fill="#3b82f6" font-weight="700" letter-spacing="1.5">PART A · 数据查询 / 出报表</text>
    <text x="24" y="80" font-size="22" font-weight="700" fill="#0f172a">🅰️ 取数 + 建卡</text>
    <text x="24" y="104" font-size="12" fill="#64748b">日常分析侧 — 一句话出图</text>
    <line x1="24" y1="124" x2="356" y2="124" stroke="#f1f5f9"/>

    <text x="24" y="152" font-size="13" font-weight="600" fill="#334155">触发场景</text>
    <text x="24" y="174" font-size="12" fill="#475569">"查 2 月各城市营业额"</text>
    <text x="24" y="192" font-size="12" fill="#475569">"做一张交叉表 / 组合图"</text>
    <text x="24" y="210" font-size="12" fill="#475569">"删掉这张卡片"</text>

    <text x="24" y="248" font-size="13" font-weight="600" fill="#334155">关键能力</text>
    <text x="24" y="270" font-size="12" fill="#475569">• 26 种图表（柱 / 折 / 交叉 / 组合 / 气泡…）</text>
    <text x="24" y="290" font-size="12" fill="#475569">• 26 种聚合 + 13 种筛选操作符</text>
    <text x="24" y="310" font-size="12" fill="#475569">• 6 种日期粒度（年 / 季 / 月 / 周 / 日 / 星期）</text>
    <text x="24" y="330" font-size="12" fill="#475569">• 自定义公式字段（SUM(x)/SUM(y)*100 类）</text>
    <text x="24" y="350" font-size="12" fill="#475569">• 多表 / 多页面 / 多字段缓存（按 --task 隔离）</text>
    <text x="24" y="370" font-size="12" fill="#475569">• 自动处理观远 7.0+ draft-release 机制</text>

    <text x="24" y="408" font-size="11" font-style="italic" fill="#94a3b8">入口指针：SKILL.md → Part A 区块</text>
  </g>

  <!-- B: ETL Governance -->
  <g transform="translate(450, 110)">
    <rect width="380" height="430" rx="14" fill="#ffffff" stroke="#e2e8f0" filter="url(#shadow)"/>
    <rect width="380" height="8" rx="3" fill="#f59e0b"/>
    <text x="24" y="46" font-size="11" fill="#f59e0b" font-weight="700" letter-spacing="1.5">PART B · ETL 治理 / 写入 / 重写</text>
    <text x="24" y="80" font-size="22" font-weight="700" fill="#0f172a">🅱️ ETL 全栈</text>
    <text x="24" y="104" font-size="12" fill="#64748b">数据中台 / 工程侧 — 严肃改造</text>
    <line x1="24" y1="124" x2="356" y2="124" stroke="#f1f5f9"/>

    <text x="24" y="152" font-size="13" font-weight="600" fill="#334155">触发场景</text>
    <text x="24" y="174" font-size="12" fill="#475569">"扫一遍 ETL 看哪些可以删"</text>
    <text x="24" y="192" font-size="12" fill="#475569">"建一个 ETL / direct-save 报错怎么修"</text>
    <text x="24" y="210" font-size="12" fill="#475569">"把这条 SmartETL 整个重写成 SQL 版"</text>

    <text x="24" y="248" font-size="13" font-weight="600" fill="#334155">关键能力</text>
    <text x="24" y="270" font-size="12" fill="#475569">• 11 个实测 BI HTTP API（CRUD 全覆盖）</text>
    <text x="24" y="290" font-size="12" fill="#475569">• 治理扫描：依赖图 + 循环检测 + 8 维去留判断</text>
    <text x="24" y="310" font-size="12" fill="#475569">• 字段使用度双源审计（page + etl 双源 grep）</text>
    <text x="24" y="330" font-size="12" fill="#475569">• ODS / DIM / DWD / DWS / APP 五层重组</text>
    <text x="24" y="350" font-size="12" fill="#475569">• v2 → v3 批量改造 SDK（7 步重写）</text>
    <text x="24" y="370" font-size="12" fill="#475569">• CTO 全链路重写法：4 件交付 + 8 条硬规则</text>

    <text x="24" y="408" font-size="11" font-style="italic" fill="#94a3b8">入口指针：SKILL.md → Part B / Part B-17 区块</text>
  </g>

  <!-- C: Custom Charts -->
  <g transform="translate(845, 110)">
    <rect width="380" height="430" rx="14" fill="#ffffff" stroke="#e2e8f0" filter="url(#shadow)"/>
    <rect width="380" height="8" rx="3" fill="#10b981"/>
    <text x="24" y="46" font-size="11" fill="#10b981" font-weight="700" letter-spacing="1.5">PART C · 自定义图表注入 / 排障</text>
    <text x="24" y="80" font-size="22" font-weight="700" fill="#0f172a">🆎 前端注入</text>
    <text x="24" y="104" font-size="12" fill="#64748b">前端开发侧 — HTML/CSS/JS 进观远</text>
    <line x1="24" y1="124" x2="356" y2="124" stroke="#f1f5f9"/>

    <text x="24" y="152" font-size="13" font-weight="600" fill="#334155">触发场景</text>
    <text x="24" y="174" font-size="12" fill="#475569">"payload_json 解析失败"</text>
    <text x="24" y="192" font-size="12" fill="#475569">"固定卡片错位 / overlay 切页残留"</text>
    <text x="24" y="210" font-size="12" fill="#475569">"复制页之后图表悄悄失效"</text>

    <text x="24" y="248" font-size="13" font-weight="600" fill="#334155">关键能力</text>
    <text x="24" y="270" font-size="12" fill="#475569">• renderChart 4 参数 runtime 契约</text>
    <text x="24" y="290" font-size="12" fill="#475569">• 5 种 data 形态识别</text>
    <text x="24" y="310" font-size="12" fill="#475569">• payload_json 截断 3 步判断（改数据 ≫ 堆兼容）</text>
    <text x="24" y="330" font-size="12" fill="#475569">• z-index 基线（容器 8 / mask 1 / 固定卡 20）</text>
    <text x="24" y="350" font-size="12" fill="#475569">• 生命周期：URL / 编辑态 / 路由离开 → 销毁</text>
    <text x="24" y="370" font-size="12" fill="#475569">• MutationObserver 死循环避坑（用低频轮询）</text>

    <text x="24" y="408" font-size="11" font-style="italic" fill="#94a3b8">入口指针：SKILL.md → Part C 区块</text>
  </g>

  <!-- Bottom strip: shared facilities -->
  <g transform="translate(55, 570)">
    <rect width="1170" height="140" rx="14" fill="#ffffff" stroke="#e2e8f0" filter="url(#shadow)"/>
    <text x="22" y="34" font-size="15" font-weight="700" fill="#0f172a">📚 共用基础设施 · 三个 Part 都依赖</text>

    <g transform="translate(22, 56)">
      <text x="0" y="14" font-size="13" font-weight="600" fill="#334155">10 类报错手册</text>
      <text x="0" y="34" font-size="11" fill="#64748b">ETL 名 / 路径 / 权限 / NULL / 别名 /</text>
      <text x="0" y="50" font-size="11" fill="#64748b">UNION 列差 / 字符串 ↔ DATE 比较 …</text>
    </g>

    <g transform="translate(310, 56)">
      <text x="0" y="14" font-size="13" font-weight="600" fill="#334155">30 条法则白皮书</text>
      <text x="0" y="34" font-size="11" fill="#64748b">"先验数据再写代码"、"避免双源覆盖"、</text>
      <text x="0" y="50" font-size="11" fill="#64748b">"删除拓扑：先 data-source 后 etl"…</text>
    </g>

    <g transform="translate(600, 56)">
      <text x="0" y="14" font-size="13" font-weight="600" fill="#334155">60+ 真实战例</text>
      <text x="0" y="34" font-size="11" fill="#64748b">实战 BI 数据中台：80+ ETL / 250+ 数据集 /</text>
      <text x="0" y="50" font-size="11" fill="#64748b">86 看板，覆盖 v3 重构 + 7 大签名动作</text>
    </g>

    <g transform="translate(890, 56)">
      <text x="0" y="14" font-size="13" font-weight="600" fill="#334155">渐进式披露</text>
      <text x="0" y="34" font-size="11" fill="#64748b">SKILL.md 913 行 + references/ 按需加载</text>
      <text x="0" y="50" font-size="11" fill="#64748b">v1.5.0 重构后 -56% token 占用</text>
    </g>
  </g>

  <!-- Footer -->
  <text x="640" y="740" text-anchor="middle" font-size="11" fill="#94a3b8">install: gh skill install maojiebc/guanyuan-majia · npx skills add maojiebc/guanyuan-majia · /plugin marketplace add maojiebc/guanyuan-majia</text>
</svg>
